<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio — Riwi Projects</title>
  <link rel="stylesheet" href="../../../css/style.css">
</head>
<body data-active-page="projects_riwi" data-title-key="title_riwi">

<nav id="main-nav"></nav>

<main>
  <div class="page-title-bar">
    <h1>
      <span data-i18n="page_projects">Projects</span>
      / <span style="color:var(--accent)" data-i18n="page_riwi">Riwi</span>
    </h1>
    <div class="title-accent-line"></div>
  </div>

  <div class="module-tabs" id="module-tabs"></div>
  <div id="module-title"></div>
  <div id="projects-container"></div>
</main>

<script src="../../../js/main.js"></script>
<script>
  buildNav('projects_riwi');

  const TOTAL_MODULES = 6;
  let activeModule = null;

  function renderModuleTabs() {
    const tabsEl = document.getElementById('module-tabs');
    tabsEl.innerHTML = Array.from({ length: TOTAL_MODULES }, (_, i) => {
      const m = i + 1;
      return `<button class="module-tab${activeModule === m ? ' active' : ''}" onclick="selectModule(${m})">${t('page_module')} ${m}</button>`;
    }).join('');
  }

  async function selectModule(moduleNumber) {
    if (activeModule === moduleNumber) return;
    activeModule = moduleNumber;

    renderModuleTabs();

    document.getElementById('module-title').innerHTML =
      `<h2 style="text-align:center; margin: 1.2rem 0 0.5rem; font-size:1.6rem;">${t('page_module')} ${moduleNumber}</h2>`;

    const container = document.getElementById('projects-container');
    renderLoading(container);
    try {
      const projects = await fetchProjectsByModule(state.lang, moduleNumber);
      renderTable(container, projects);
    } catch (e) {
      renderError(container, t('error'));
      console.error(e);
    }
  }

  function onLangChange(lang) {
    renderModuleTabs();
    if (activeModule !== null) {
      document.getElementById('module-title').innerHTML =
        `<h2 style="text-align:center; margin: 1.2rem 0 0.5rem; font-size:1.6rem;">${t('page_module')} ${activeModule}</h2>`;
      // Resetear para forzar re-fetch y re-render con los textos del nuevo idioma
      const moduleToReload = activeModule;
      activeModule = null;
      selectModule(moduleToReload);
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderModuleTabs();
  });
</script>
</body>
</html>
